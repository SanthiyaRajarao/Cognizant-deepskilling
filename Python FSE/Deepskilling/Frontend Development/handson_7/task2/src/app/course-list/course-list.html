<h2>Available Courses</h2>

<input
type="text"
placeholder="Search Courses"
[(ngModel)]="searchTerm">

<div *ngIf="loading">

<h2>Loading Courses...</h2>

</div>

<div
class="course-container"
*ngIf="!loading">

<app-course-card

*ngFor="let course of filteredCourses"

[name]="course.name"

[code]="course.code"

[credits]="course.credits"

[grade]="course.grade">

</app-course-card>

</div>
